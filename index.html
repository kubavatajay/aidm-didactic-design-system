<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0;url=https://www.perplexity.ai/apps/8c2d35de-b2c0-4b80-a9be-eb0f9688606d">
    <title>AIDM - Austin Institute of Dental Medicine Didactic Design System</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0a1628 0%, #1a2942 100%);
            color: white;
        }
        .container { text-align: center; }
        h1 { font-size: 2.2rem; margin-bottom: 0.5rem; color: #4ecdc4; }
        h2 { font-size: 1.4rem; margin-bottom: 1rem; font-weight: 300; opacity: 0.9; }
        p { font-size: 1rem; opacity: 0.7; }
        .loader {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #4ecdc4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 1.5rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AIDM</h1>
        <h2>Austin Institute of Dental Medicine</h2>
        <p>Didactic Design System</p>
        <div class="loader"></div>
        <p>Redirecting to the app...</p>
        <p style="font-size: 0.8rem; margin-top: 1.5rem; opacity: 0.5;">Residency Program · Cohort 2025-2026</p>
    </div>
</body>
</html>
